<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 260" role="img" aria-labelledby="title desc">
  <title id="title">LYAPAX logo</title>
  <desc id="desc">Flat LYAPAX wordmark in blue, teal, and magenta with a small Lyapunov spectrum accent.</desc>
  <defs>
    <style>
      .word {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 104px;
        font-weight: 700;
        letter-spacing: 2px;
      }
      .tagline {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 21px;
        font-weight: 700;
        letter-spacing: 4px;
        fill: #475569;
      }
      .bar { rx: 3; }
    </style>
  </defs>

  <rect width="980" height="260" fill="none"/>

  <g transform="translate(62 54)">
    <text class="word" x="0" y="82">
      <tspan fill="#2563eb">LYA</tspan><tspan fill="#0f766e">P</tspan><tspan fill="#c026d3">AX</tspan>
    </text>

    <path d="M18 116 H512" fill="none" stroke="#e2e8f0" stroke-width="10" stroke-linecap="round"/>
    <path d="M18 116 H178" fill="none" stroke="#2563eb" stroke-width="10" stroke-linecap="round"/>
    <path d="M178 116 H312" fill="none" stroke="#0f766e" stroke-width="10" stroke-linecap="round"/>
    <path d="M312 116 H512" fill="none" stroke="#c026d3" stroke-width="10" stroke-linecap="round"/>

    <text class="tagline" x="4" y="162">LYAPUNOV EXPONENTS IN JAX</text>
  </g>

  <g transform="translate(705 58)">
    <rect class="bar" x="0" y="67" width="28" height="56" fill="#2563eb"/>
    <rect class="bar" x="50" y="92" width="28" height="31" fill="#0f766e"/>
    <rect class="bar" x="100" y="123" width="28" height="43" fill="#c026d3"/>
    <rect class="bar" x="150" y="123" width="28" height="66" fill="#7c3aed"/>
    <path d="M-12 123 H196" fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
    <text x="-3" y="38" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#111827">λ</text>
    <text x="29" y="38" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#64748b">spectrum</text>
  </g>
</svg>
