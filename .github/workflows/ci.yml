name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # dev + adaptive: without the adaptive extra, tests/test_adaptive_*.py
      # pytest.importorskip("diffrax") and are silently skipped rather than
      # run -- installing it here is what actually exercises the adaptive
      # ODE integrator in CI, not just the docs job (which only runs it as
      # a sphinx-gallery example, not as a test).
      - name: Install lyapax (dev + adaptive extras)
        run: pip install -e ".[dev,adaptive]"

      # tests/conftest.py forces JAX_PLATFORMS=cpu and jax_enable_x64=True,
      # so no extra env setup is needed here -- GitHub-hosted runners have
      # no GPU anyway.
      - name: Run test suite
        run: python -m pytest -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check src tests

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check package metadata
        run: twine check dist/*

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # docs extra alone omits diffrax (kept optional, see pyproject.toml) --
      # but sphinx-gallery unconditionally executes examples/15_adaptive_ode.py
      # (unlike the test suite, which pytest.importorskip's diffrax-dependent
      # tests), so the docs build needs the adaptive extra too.
      - name: Install lyapax (docs + adaptive extras)
        run: pip install -e ".[docs,adaptive]"

      - name: Build Sphinx docs
        run: sphinx-build -b html -W docs docs/_build/html
